<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ELF METAL ART DECORATIVE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --red: #cc1c1c; --border: #e0e0e0; }
    body { font-family: 'Segoe UI', sans-serif; color: #222; }
    nav { padding: 15px 20px; border-bottom: 1px solid var(--border); background: #fff; }
    .logo { font-weight: 800; color: var(--red); text-transform: uppercase; }
    
    #layanan { padding: 40px 20px; max-width: 1200px; margin: auto; }
    #layanan h2 { text-align: center; color: var(--red); margin-bottom: 30px; }
    
    .services-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
        gap: 20px; 
    }
    
    .service-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: #fff; }
    .card-img { width: 100%; height: 180px; overflow: hidden; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .card-label { text-align: center; padding: 15px; font-weight: 700; }
  </style>
</head>
<body>
  <nav><div class="logo">ELF METAL ART</div></nav>

  <section id="layanan">
    <h2>Katalog Layanan Kami</h2>
    <div class="services-grid" id="produk-container">
      <!-- Barang statis (yang lama) -->
      <div class="service-card"><div class="card-img"><img src="Pagar (1).jpg" alt="Pagar"></div><div class="card-label">Pagar</div></div>
      <div class="service-card"><div class="card-img"><img src="Kanopi.jpg" alt="Kanopi"></div><div class="card-label">Kanopi</div></div>
    </div>
  </section>

  <script>
    function loadKatalog() {
      const container = document.getElementById('produk-container');
      // Kuncinya harus SAMA: 'produkList'
      const dataProduk = JSON.parse(localStorage.getItem('produkList')) || [];

      dataProduk.forEach(p => {
        const div = document.createElement('div');
        div.className = 'service-card';
        div.innerHTML = `
          <div class="card-img"><img src="${p.foto}"></div>
          <div class="card-label">${p.nama}</div>
        `;
        container.appendChild(div);
      });
    }
    window.onload = loadKatalog;
  </script>
</body>
</html>
